<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .demo-container { max-width: 900px; margin: auto; background: white; padding: 10px; }
        h1 { color: #3498db; margin-top: 0; font-size: 1.8rem; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .description { color: #666; font-style: italic; margin-bottom: 25px; }
        .work-area { border: none; padding: 0; }
    
    </style>
</head>
<body><div class="demo-container">
    
    
    <div class="work-area">
        <form style="display:flex; flex-direction:column; gap:12px;">
            <label>Username: <input type="text" style="width:100%; padding:8px;"></label>
            <label>Email: <input type="email" style="width:100%; padding:8px;"></label>
            <label>Password: <input type="password" style="width:100%; padding:8px;"></label>
            <button type="submit" style="background:#3498db; color:white; border:none; padding:10px; border-radius:4px;">Register Now</button>
        </form>
    </div>
</div>
</body>
</html>
