<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
    .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    </style></head><body>
        <div class="container">
            <h2>Grid Hard Challenge #5</h2>
            <p>Create a layout with overlapping images using grid.</p>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f0f0f0; padding: 20px;">
                <div style="background: #34495e; color: white; padding: 30px; text-align: center; border-radius: 8px;">Grid Box 1</div>
                <div style="background: #34495e; color: white; padding: 30px; text-align: center; border-radius: 8px;">Grid Box 2</div>
                <div style="background: #34495e; color: white; padding: 30px; text-align: center; border-radius: 8px;">Grid Box 3</div>
                <div style="background: #34495e; color: white; padding: 30px; text-align: center; border-radius: 8px;">Grid Box 4</div>
                <div style="background: #34495e; color: white; padding: 30px; text-align: center; border-radius: 8px;">Grid Box 5</div>
                <div style="background: #34495e; color: white; padding: 30px; text-align: center; border-radius: 8px;">Grid Box 6</div>
            </div>
        </div>
        </body></html>
