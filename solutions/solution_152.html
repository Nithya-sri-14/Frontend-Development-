<!DOCTYPE html>
<html>
<head>
    <style>
        .flex-container {
            display: flex;
            background-color: #2c3e50;
            padding: 20px;
            gap: 15px;
            justify-content: space-around;
            flex-wrap: wrap;
            border-radius: 10px;
        }
        .flex-item {
            background-color: #ecf0f1;
            padding: 30px;
            border-radius: 5px;
            text-align: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            flex: 1 1 100px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .item-1 { background-color: #e74c3c; color: white; }
        .item-2 { background-color: #3498db; color: white; }
        .item-3 { background-color: #2ecc71; color: white; }
    </style>
</head>
<body>
    <h3>Flexbox Layout Challenge 152</h3>
    <div class='flex-container'>
        <div class='flex-item item-1'>One</div>
        <div class='flex-item item-2'>Two</div>
        <div class='flex-item item-3'>Three</div>
    </div>
</body>
</html>
