<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .demo-container { max-width: 900px; margin: auto; background: white; padding: 10px; }
        h1 { color: #e67e22; margin-top: 0; font-size: 1.8rem; border-bottom: 2px solid #e67e22; padding-bottom: 10px; }
        .description { color: #666; font-style: italic; margin-bottom: 25px; }
        .work-area { border: none; padding: 0; }
    
        .grid-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-item { background: #eee; border: 1px solid #e67e22; padding: 10px; text-align: center; }
    </style>
</head>
<body><div class="demo-container">
    
    
    <div class="work-area">
        <div class="grid-box">
            <div class="grid-item">1</div><div class="grid-item">2</div><div class="grid-item">3</div>
            <div class="grid-item">4</div><div class="grid-item">5</div><div class="grid-item">6</div>
        </div>
        <p style="margin-top:10px; font-weight:bold;">Implement a centered landing page section with grid.</p>
    </div>
</div>
</body>
</html>
