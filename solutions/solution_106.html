<!DOCTYPE html>
<html lang='en'>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 0; background: #eef2f3; }
        nav { background: #2c3e50; color: white; padding: 10px; display: flex; justify-content: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        article { max-width: 800px; margin: 20px auto; background: white; padding: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        aside { width: 200px; float: right; background: #fff; padding: 15px; margin: 20px; border-left: 5px solid #3498db; }
        section { margin-bottom: 20px; }
        footer { clear: both; background: #34495e; color: white; text-align: center; padding: 20px; position: relative; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <nav>
        <a href='#'>Home</a> <a href='#'>About</a> <a href='#'>Services</a>
    </nav>
    <aside>
        <h4>Related Info</h4>
        <p>This is an aside element providing extra context.</p>
    </aside>
    <article>
        <header>
            <h2>Intermediate Layout 106</h2>
            <p>Published on: <time datetime='2023-10-27'>October 27, 2023</time></p>
        </header>
        <section>
            <h3>Section Header</h3>
            <p>Using article, section, aside, nav, and time tags for better SEO and accessibility.</p>
        </section>
    </article>
    <footer>
        <p>Intermediate Semantic HTML &copy; 2023</p>
    </footer>
</body>
</html>
