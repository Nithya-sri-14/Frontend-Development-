<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .demo-container { max-width: 900px; margin: auto; background: white; padding: 10px; }
        h1 { color: #9b59b6; margin-top: 0; font-size: 1.8rem; border-bottom: 2px solid #9b59b6; padding-bottom: 10px; }
        .description { color: #666; font-style: italic; margin-bottom: 25px; }
        .work-area { border: none; padding: 0; }
    
        .flex-box { display: flex; flex-wrap: wrap; gap: 15px; }
        .flex-item { background: #9b59b6; color: white; padding: 15px; border-radius: 5px; flex: 1; min-width: 100px; text-align: center; }
    </style>
</head>
<body><div class="demo-container">
    
    
    <div class="work-area">
        <div class="flex-box">
            <div class="flex-item">Flex 1</div>
            <div class="flex-item">Flex 2</div>
            <div class="flex-item">Flex 3</div>
        </div>
        <p style="margin-top:10px; font-weight:bold;">Build a social media share bar with flex-justify.</p>
    </div>
</div>
</body>
</html>
