<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
    .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    </style></head><body>
        <div class="container">
            <h2>Flexbox Hard Challenge #4</h2>
            <p>Design a notification toast system using flexbox.</p>
            <div style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; background: #eee; padding: 20px; border-radius: 4px;">
                <div style="flex: 1 1 150px; height: 100px; background: #1abc9c; color: white; display: flex; align-items: center; justify-content: center; border-radius: 4px;">Item 1</div>
                <div style="flex: 1 1 150px; height: 100px; background: #3498db; color: white; display: flex; align-items: center; justify-content: center; border-radius: 4px;">Item 2</div>
                <div style="flex: 1 1 150px; height: 100px; background: #9b59b6; color: white; display: flex; align-items: center; justify-content: center; border-radius: 4px;">Item 3</div>
                <div style="flex: 1 1 150px; height: 100px; background: #f1c40f; color: white; display: flex; align-items: center; justify-content: center; border-radius: 4px;">Item 4</div>
            </div>
        </div>
        </body></html>
