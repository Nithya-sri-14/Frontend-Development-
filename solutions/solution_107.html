<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .demo-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2ecc71; margin-top: 0; font-size: 1.8rem; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; }
        .description { color: #666; font-style: italic; margin-bottom: 25px; }
        .work-area { border: 2px dashed #ddd; padding: 20px; border-radius: 8px; }
    
    </style>
</head>
<body><div class="demo-container">
    <h1>Semantic HTML Intermediate Challenge #7</h1>
    <p class="description">Task: Build a comment section using article and footer for metadata.</p>
    <div class="work-area">
        <article>
            <header>
                <h2>Sample Article Title</h2>
                <p>By <address style="display:inline;">Admin</address> on <time datetime="2023-01-01">Jan 1st</time></p>
            </header>
            <section>
                <p>This is the main section of the article content.</p>
            </section>
            <footer>
                <p>Tags: Semantic, Web</p>
            </footer>
        </article>
    </div>
</div>
</body>
</html>
