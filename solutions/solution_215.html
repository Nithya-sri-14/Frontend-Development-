<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px; background-color: #f4f7f6; }
    .component-container { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 1000px; margin: auto; }
    h1, h2 { color: #3498db; margin-top: 0; }
    .tag { display: inline-block; padding: 4px 12px; background: #3498db; color: white; border-radius: 20px; font-size: 0.8rem; margin-bottom: 15px; }
    
        <div class="component-container">
            <span class="tag">Forms - Hard</span>
            <h2>Forms Hard Challenge #3</h2>
            <p style="color: #666; font-size: 0.95rem; margin-bottom: 25px;">Build a registration form with a password strength meter.</p>
            <div style="height: 2px; background: linear-gradient(to right, #3498db, transparent); margin-bottom: 30px;"></div>
    
            <form style="max-width: 500px; margin-top: 20px;">
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Username</label>
                    <input type="text" placeholder="johndoe123" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Email Address</label>
                    <input type="email" placeholder="john@example.com" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div>
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Password</label>
                        <input type="password" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Confirm Password</label>
                        <input type="password" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                    </div>
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Gender</label>
                    <div style="display: flex; gap: 20px;">
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;"><input type="radio" name="gender"> Male</label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;"><input type="radio" name="gender"> Female</label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;"><input type="radio" name="gender"> Other</label>
                    </div>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Country</label>
                    <select style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff;">
                        <option>United States</option>
                        <option>United Kingdom</option>
                        <option>Canada</option>
                        <option>India</option>
                        <option>Australia</option>
                    </select>
                </div>
                <button type="button" style="background: #3498db; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; width: 100%;">Submit</button>
            </form>
    </div>
</body></html>
