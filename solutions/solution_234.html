<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .demo-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #e74c3c; margin-top: 0; font-size: 1.8rem; border-bottom: 2px solid #e74c3c; padding-bottom: 10px; }
        .description { color: #666; font-style: italic; margin-bottom: 25px; }
        .work-area { border: 2px dashed #ddd; padding: 20px; border-radius: 8px; }
    th { background: #e74c3c; color: white; } td, th { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body><div class="demo-container">
    <h1>Tables Hard Challenge #10</h1>
    <p class="description">Task: Create a table with varied alignment (left/center/right) per column.</p>
    <div class="work-area">
        <table style="width:100%; border-collapse:collapse;">
            <thead><tr><th>Header A</th><th>Header B</th></tr></thead>
            <tbody>
                <tr><td>Data 1</td><td>Data 2</td></tr>
                <tr><td>Data 3</td><td>Data 4</td></tr>
            </tbody>
        </table>
        <p style="margin-top:10px;"><b>Task:</b> Create a table with varied alignment (left/center/right) per column.</p>
    </div>
</div>
</body>
</html>
