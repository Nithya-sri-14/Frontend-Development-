<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px; background-color: #f9f9f9; }
    .component-container { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 1000px; margin: auto; }
    h1, h2 { color: #34495e; margin-top: 0; }
    .tag { display: inline-block; padding: 4px 12px; background: #34495e; color: white; border-radius: 20px; font-size: 0.8rem; margin-bottom: 15px; }
    
        <div class="component-container">
            <span class="tag">Forms - Beginner</span>
            <h2>Forms Beginner Challenge #12</h2>
            <p style="color: #666; font-size: 0.95rem; margin-bottom: 25px;">Create a survey form with a variety of input types (color, number, tel).</p>
            <div style="height: 2px; background: linear-gradient(to right, #34495e, transparent); margin-bottom: 30px;"></div>
    
            <form style="max-width: 500px; margin-top: 20px;">
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Full Name</label>
                    <input type="text" placeholder="Your Name" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Subject</label>
                    <input type="text" placeholder="How can we help?" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: 500;">Message</label>
                    <textarea rows="5" placeholder="Write your message here..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; resize: vertical;"></textarea>
                </div>
                <button type="button" style="background: #34495e; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; width: 100%;">Submit</button>
            </form>
    </div>
</body></html>
