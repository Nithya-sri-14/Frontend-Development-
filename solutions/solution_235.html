<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px; background-color: #ffffff; }
    .component-container { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 1000px; margin: auto; }
    h1, h2 { color: #34495e; margin-top: 0; }
    .tag { display: inline-block; padding: 4px 12px; background: #34495e; color: white; border-radius: 20px; font-size: 0.8rem; margin-bottom: 15px; }
    
        </style></head><body>
<div class="component-container">
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 8px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.05);">
                <thead>
                    <tr style="background: #34495e; color: white;">
                        <th style="padding: 15px; text-align: left;">Employee</th>
                        <th style="padding: 15px; text-align: left;">Role</th>
                        <th style="padding: 15px; text-align: left;">Department</th>
                        <th style="padding: 15px; text-align: left;">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 15px; display: flex; align-items: center;">
                            <div style="width: 35px; height: 35px; background: #ddd; border-radius: 50%; margin-right: 10px;"></div>
                            Alice Johnson
                        </td>
                        <td style="padding: 15px;">Frontend Developer</td>
                        <td style="padding: 15px;">Engineering</td>
                        <td style="padding: 15px;"><span style="background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem;">Active</span></td>
                    </tr>
                    <tr style="border-bottom: 1px solid #eee; background: #fafafa;">
                        <td style="padding: 15px; display: flex; align-items: center;">
                            <div style="width: 35px; height: 35px; background: #ddd; border-radius: 50%; margin-right: 10px;"></div>
                            Bob Smith
                        </td>
                        <td style="padding: 15px;">UI Designer</td>
                        <td style="padding: 15px;">Design</td>
                        <td style="padding: 15px;"><span style="background: #fff3e0; color: #ef6c00; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem;">On Leave</span></td>
                    </tr>
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 15px; display: flex; align-items: center;">
                            <div style="width: 35px; height: 35px; background: #ddd; border-radius: 50%; margin-right: 10px;"></div>
                            Charlie Brown
                        </td>
                        <td style="padding: 15px;">Product Manager</td>
                        <td style="padding: 15px;">Product</td>
                        <td style="padding: 15px;"><span style="background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem;">Active</span></td>
                    </tr>
                </tbody>
            </table>
    </div>
</body></html>
