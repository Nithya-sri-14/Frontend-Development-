<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px; background-color: #ffffff; }
    .component-container { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 1000px; margin: auto; }
    h1, h2 { color: #3498db; margin-top: 0; }
    .tag { display: inline-block; padding: 4px 12px; background: #3498db; color: white; border-radius: 20px; font-size: 0.8rem; margin-bottom: 15px; }
    
        <div class="component-container">
            <style>
                .responsive-container {
                    display: flex;
                    flex-wrap: wrap;
                    gap: 20px;
                    margin-top: 20px;
                }
                .box {
                    flex: 1 1 100%;
                    padding: 30px;
                    background: #3498db;
                    color: white;
                    border-radius: 8px;
                    text-align: center;
                    transition: all 0.4s ease;
                }
                @media (min-width: 600px) {
                    .box { flex: 1 1 45%; background: #2ecc71; }
                }
                @media (min-width: 900px) {
                    .box { flex: 1 1 30%; background: #e67e22; }
                }
            </style>
            <div class="responsive-container">
                <div class="box">
                    <h3 style="color: white;">Mobile First</h3>
                    <p>Current View: Check by resizing!</p>
                </div>
                <div class="box">
                    <h3 style="color: white;">Tablet View</h3>
                    <p>Optimized for mid-range.</p>
                </div>
                <div class="box">
                    <h3 style="color: white;">Desktop View</h3>
                    <p>Full-width power.</p>
                </div>
            </div>
    </div>
</body></html>
