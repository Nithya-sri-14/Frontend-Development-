<!DOCTYPE html>
<html lang='en'>
<head>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        header { background: #333; color: white; padding: 1rem; text-align: center; }
        main { background: white; padding: 20px; margin-top: 10px; border-radius: 8px; }
        footer { margin-top: 20px; text-align: center; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <h1>My Simple Website</h1>
    </header>
    <main>
        <h2>Welcome to Page 7</h2>
        <p>This is a beginner-level semantic HTML structure using header, main, and footer tags.</p>
    </main>
    <footer>
        <p>&copy; 2023 Beginner Projects</p>
    </footer>
</body>
</html>
