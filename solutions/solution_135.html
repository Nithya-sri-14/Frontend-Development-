<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
    .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    </style></head><body>
        <div class="container">
            <h2>Tables Intermediate Challenge #11</h2>
            <p>Design a table for a flight schedule with gate numbers.</p>
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <thead>
                    <tr style="background-color: #3498db; color: white;">
                        <th style="padding: 12px; border: 1px solid #ddd; text-align: left;">ID</th>
                        <th style="padding: 12px; border: 1px solid #ddd; text-align: left;">Name</th>
                        <th style="padding: 12px; border: 1px solid #ddd; text-align: left;">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="padding: 12px; border: 1px solid #ddd;">001</td>
                        <td style="padding: 12px; border: 1px solid #ddd;">Product A</td>
                        <td style="padding: 12px; border: 1px solid #ddd;"><span style="background: #27ae60; color: white; padding: 3px 8px; border-radius: 12px; font-size: 0.8rem;">Active</span></td>
                    </tr>
                    <tr style="background-color: #f9f9f9;">
                        <td style="padding: 12px; border: 1px solid #ddd;">002</td>
                        <td style="padding: 12px; border: 1px solid #ddd;">Product B</td>
                        <td style="padding: 12px; border: 1px solid #ddd;"><span style="background: #e67e22; color: white; padding: 3px 8px; border-radius: 12px; font-size: 0.8rem;">Pending</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
        </body></html>
