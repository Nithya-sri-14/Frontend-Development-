<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .demo-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #f1c40f; margin-top: 0; font-size: 1.8rem; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; }
        .description { color: #666; font-style: italic; margin-bottom: 25px; }
        .work-area { border: 2px dashed #ddd; padding: 20px; border-radius: 8px; }
    
    </style>
</head>
<body><div class="demo-container">
    <h1>Forms Hard Challenge #12</h1>
    <p class="description">Task: Create a multi-step signup with email verification field.</p>
    <div class="work-area">
        <form style="display:flex; flex-direction:column; gap:12px;">
            <label>Username: <input type="text" style="width:100%; padding:8px;"></label>
            <label>Email: <input type="email" style="width:100%; padding:8px;"></label>
            <label>Password: <input type="password" style="width:100%; padding:8px;"></label>
            <button type="submit" style="background:#f1c40f; color:white; border:none; padding:10px; border-radius:4px;">Register Now</button>
        </form>
    </div>
</div>
</body>
</html>
