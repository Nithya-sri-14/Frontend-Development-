<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px; background-color: #ffffff; }
    .component-container { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 1000px; margin: auto; }
    h1, h2 { color: #e74c3c; margin-top: 0; }
    .tag { display: inline-block; padding: 4px 12px; background: #e74c3c; color: white; border-radius: 20px; font-size: 0.8rem; margin-bottom: 15px; }
    
        </style></head><body>
<div class="component-container">
            <div class="pricing-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;">
                <div style="border: 1px solid #ddd; padding: 30px; border-radius: 8px; text-align: center;">
                    <h3>Basic</h3>
                    <div style="font-size: 2.5rem; font-weight: bold; margin: 15px 0;">$19<span style="font-size: 1rem; color: #777;">/mo</span></div>
                    <ul style="list-style: none; padding: 0; margin: 20px 0; color: #666;">
                        <li style="margin-bottom: 10px;">5 Projects</li>
                        <li style="margin-bottom: 10px;">Basic Support</li>
                        <li style="margin-bottom: 10px;">1GB Storage</li>
                    </ul>
                    <button style="background: #e74c3c; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; width: 100%;">Get Started</button>
                </div>
                <div style="border: 2px solid #e74c3c; padding: 30px; border-radius: 8px; text-align: center; position: relative; transform: scale(1.05); background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                    <span style="position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #e74c3c; color: white; padding: 2px 15px; border-radius: 10px; font-size: 0.8rem;">POPULAR</span>
                    <h3>Pro</h3>
                    <div style="font-size: 2.5rem; font-weight: bold; margin: 15px 0;">$49<span style="font-size: 1rem; color: #777;">/mo</span></div>
                    <ul style="list-style: none; padding: 0; margin: 20px 0; color: #666;">
                        <li style="margin-bottom: 10px;">Unlimited Projects</li>
                        <li style="margin-bottom: 10px;">Priority Support</li>
                        <li style="margin-bottom: 10px;">10GB Storage</li>
                    </ul>
                    <button style="background: #e74c3c; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; width: 100%;">Start Free Trial</button>
                </div>
                <div style="border: 1px solid #ddd; padding: 30px; border-radius: 8px; text-align: center;">
                    <h3>Enterprise</h3>
                    <div style="font-size: 2.5rem; font-weight: bold; margin: 15px 0;">$99<span style="font-size: 1rem; color: #777;">/mo</span></div>
                    <ul style="list-style: none; padding: 0; margin: 20px 0; color: #666;">
                        <li style="margin-bottom: 10px;">Custom Solutions</li>
                        <li style="margin-bottom: 10px;">24/7 Support</li>
                        <li style="margin-bottom: 10px;">Unlimited Storage</li>
                    </ul>
                    <button style="background: #e74c3c; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; width: 100%;">Contact Sales</button>
                </div>
            </div>
    </div>
</body></html>
