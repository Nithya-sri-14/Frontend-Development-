<!DOCTYPE html>
<html lang='en'>
<head>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #fdfdfd; margin: 0; }
        .wrapper { display: grid; grid-template-areas: 'head head' 'nav content' 'footer footer'; grid-template-columns: 250px 1fr; min-height: 100vh; }
        header { grid-area: head; background: #1a1a1a; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav { grid-area: nav; background: #f8f9fa; border-right: 1px solid #dee2e6; padding: 2rem; }
        main { grid-area: content; padding: 3rem; }
        figure { margin: 2rem 0; background: #f1f3f5; padding: 1rem; border-radius: 4px; text-align: center; }
        figcaption { font-style: italic; color: #495057; margin-top: 0.5rem; }
        details { background: #fff9db; padding: 1rem; border: 1px solid #fab005; border-radius: 4px; margin-top: 1rem; }
        footer { grid-area: footer; background: #343a40; color: #adb5bd; padding: 1.5rem; text-align: center; }
    </style>
</head>
<body>
    <div class='wrapper'>
        <header role='banner'>
            <h1>Admin Panel 212</h1>
            <button aria-label='User Profile'>Profile</button>
        </header>
        <nav role='navigation' aria-label='Side Menu'>
            <ul>
                <li><a href='#'>Dashboard</a></li>
                <li><a href='#'>Analytics</a></li>
                <li><a href='#'>Reports</a></li>
            </ul>
        </nav>
        <main id='main-content'>
            <section aria-labelledby='stats-title'>
                <h2 id='stats-title'>Complex Data Summary</h2>
                <figure>
                    <div style='height: 100px; background: linear-gradient(90deg, #339af0 70%, #ced4da 70%); border-radius: 20px;'></div>
                    <figcaption>Fig. 212: Growth projection chart placeholder</figcaption>
                </figure>
                <details>
                    <summary>View Technical Specifications</summary>
                    <p>This uses ARIA roles, figure/figcaption, details/summary, and semantic landmark roles for maximum accessibility.</p>
                </details>
            </section>
        </main>
        <footer role='contentinfo'>
            <address>Contact: info@complex-layout.com | <time datetime='2023'>2023</time></address>
        </footer>
    </div>
</body>
</html>
