<!DOCTYPE html>
<html>
<head>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            grid-auto-rows: 150px;
            gap: 15px;
            background: #eee;
            padding: 15px;
            border-radius: 8px;
        }
        .grid-item {
            background: #fff;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 1.5rem;
            color: #333;
            box-shadow: 2px 2px 0 #000;
        }
        .featured {
            grid-column: span 2;
            grid-row: span 2;
            background: #ffd700;
        }
    </style>
</head>
<body>
    <h3>CSS Grid Visualizer 73</h3>
    <div class='grid-container'>
        <div class='grid-item featured'>Main</div>
        <div class='grid-item'>1</div>
        <div class='grid-item'>2</div>
        <div class='grid-item'>3</div>
        <div class='grid-item'>4</div>
    </div>
</body>
</html>
