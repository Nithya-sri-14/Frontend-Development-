<!DOCTYPE html>
<html>
<head>
    <style>
        table { border-collapse: collapse; width: 90%; margin: auto; font-family: Arial, sans-serif; }
        colgroup .category-col { background-color: #e3f2fd; width: 30%; }
        colgroup .val-cols { width: 35%; }
        th, td { border: 2px solid #1976d2; padding: 12px; text-align: center; }
        th { background-color: #2196f3; color: white; text-transform: uppercase; }
        .header-main { font-size: 1.1rem; }
        .header-sub { background-color: #bbdefb; color: #333; font-size: 0.9rem; }
        td { color: #555; }
        tr:hover td { background-color: #fff9c4; }
    </style>
</head>
<body>
    <h2 style='text-align: center;'>Complex Multi-Header Table 227</h2>
    <table>
        <colgroup>
            <col class='category-col'>
            <col class='val-cols' span='2'>
        </colgroup>
        <thead>
            <tr class='header-main'>
                <th rowspan='2'>Department</th>
                <th colspan='2'>Performance Metrics</th>
            </tr>
            <tr class='header-sub'>
                <th>Efficiency</th>
                <th>Quality Score</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Software Dev</td>
                <td>92%</td>
                <td>4.8 / 5.0</td>
            </tr>
            <tr>
                <td>Customer Support</td>
                <td>88%</td>
                <td>4.5 / 5.0</td>
            </tr>
            <tr>
                <td>Marketing</td>
                <td>95%</td>
                <td>4.2 / 5.0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
