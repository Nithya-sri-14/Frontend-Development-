<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .demo-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1abc9c; margin-top: 0; font-size: 1.8rem; border-bottom: 2px solid #1abc9c; padding-bottom: 10px; }
        .description { color: #666; font-style: italic; margin-bottom: 25px; }
        .work-area { border: 2px dashed #ddd; padding: 20px; border-radius: 8px; }
    
        .grid-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-item { background: #eee; border: 1px solid #1abc9c; padding: 10px; text-align: center; }
    </style>
</head>
<body><div class="demo-container">
    <h1>Grid Intermediate Challenge #9</h1>
    <p class="description">Task: Design a layout with sticky header and footer using grid.</p>
    <div class="work-area">
        <div class="grid-box">
            <div class="grid-item">1</div><div class="grid-item">2</div><div class="grid-item">3</div>
            <div class="grid-item">4</div><div class="grid-item">5</div><div class="grid-item">6</div>
        </div>
        <p style="margin-top:10px; font-weight:bold;">Design a layout with sticky header and footer using grid.</p>
    </div>
</div>
</body>
</html>
