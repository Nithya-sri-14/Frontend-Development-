<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
    .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    </style></head><body>
        <div class="container">
            <h2>Box Model Beginner Challenge #11</h2>
            <p>Design a layout using negative margins for overlapping.</p>
            <div style="margin: 40px; border: 5px solid #2c3e50; padding: 30px; background: #ecf0f1; text-align: center;">
                <div style="background: #3498db; color: white; padding: 20px; border: 2px solid white;">
                    Inner Content with Padding, Border, and Margin
                </div>
            </div>
            <div style="display: flex; gap: 20px; justify-content: center; margin-top: 20px;">
                <div style="width: 100px; height: 100px; background: #e74c3c; display: flex; align-items: center; justify-content: center; color: white;">Margin</div>
                <div style="width: 100px; height: 100px; background: #2ecc71; display: flex; align-items: center; justify-content: center; color: white;">Padding</div>
            </div>
        </div>
        </body></html>
