<!DOCTYPE html>
<html>
<head>
    <style>
        .card-form { max-width: 450px; background: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-family: sans-serif; }
        fieldset { border: 2px solid #3498db; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        legend { color: #3498db; font-weight: bold; padding: 0 10px; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .field { flex: 1; }
        label { display: block; font-size: 0.9rem; margin-bottom: 6px; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        input:focus { border-color: #3498db; outline: none; }
        .btn { width: 100%; background: #2ecc71; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class='card-form'>
        <h2>User Registration 117</h2>
        <form>
            <fieldset>
                <legend>Account Details</legend>
                <div class='row'>
                    <div class='field'>
                        <label>Email Address</label>
                        <input type='email' required placeholder='name@example.com'>
                    </div>
                </div>
                <div class='row'>
                    <div class='field'>
                        <label>Password</label>
                        <input type='password' minlength='8' required>
                    </div>
                </div>
            </fieldset>
            <div class='row'>
                <div class='field'>
                    <label>Country</label>
                    <select>
                        <option>USA</option>
                        <option>UK</option>
                        <option>India</option>
                    </select>
                </div>
            </div>
            <button type='submit' class='btn'>Create Account</button>
        </form>
    </div>
</body>
</html>
