<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
    .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    </style></head><body>
        <div class="container">
            <h2>Forms Intermediate Challenge #2</h2>
            <p style="margin-bottom: 20px; color: #666;">Implement a reset password form with requirement indicators.</p>
            <form style="display: flex; flex-direction: column; gap: 15px; max-width: 500px;">
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Full Name</label>
                    <input type="text" placeholder="John Doe" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Email Address</label>
                    <input type="email" placeholder="john@example.com" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Message</label>
                    <textarea rows="4" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;"></textarea>
                </div>
                <button type="button" style="background: #3498db; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-size: 1rem;">Submit Form</button>
            </form>
        </div>
        </body></html>
