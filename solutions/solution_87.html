<!DOCTYPE html><html><head><style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
    .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    </style></head><body>
        <style>
            .responsive-box {
                background-color: #3498db;
                color: white;
                padding: 40px;
                text-align: center;
                font-size: 1.5rem;
                transition: all 0.3s ease;
            }
            .sidebar { display: none; background: #ecf0f1; padding: 20px; }
            
            @media (min-width: 768px) {
                .responsive-box { background-color: #2ecc71; font-size: 2rem; }
                .main-layout { display: flex; gap: 20px; }
                .sidebar { display: block; flex: 1; }
                .content { flex: 3; }
            }
            
            @media (min-width: 1024px) {
                .responsive-box { background-color: #e67e22; }
            }
        </style>
        <div class="container">
            <h2>Media Queries Beginner Challenge #13</h2>
            <p>Build a responsive pricing table with toggle for monthly/yearly.</p>
            <div class="main-layout">
                <div class="sidebar">Desktop Sidebar</div>
                <div class="content">
                    <div class="responsive-box">
                        Resize the window!
                    </div>
                </div>
            </div>
        </div>
        </body></html>
