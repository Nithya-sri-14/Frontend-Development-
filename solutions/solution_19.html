<!DOCTYPE html>
<html>
<head>
    <style>
        .simple-form { max-width: 300px; background: #fff; padding: 20px; border: 1px solid #ccc; border-radius: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class='simple-form'>
        <h3>Sign Up 19</h3>
        <form>
            <div class='form-group'>
                <label for='user'>Username</label>
                <input type='text' id='user' placeholder='Enter username'>
            </div>
            <button type='submit'>Register</button>
        </form>
    </div>
</body>
</html>
